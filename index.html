function playRaw(url,gain){
var ctx=getCtx();
fetch(url).then(function(r){return r.arrayBuffer();})
.then(function(b){return ctx.decodeAudioData(b);})
.then(function(d){
var src=ctx.createBufferSource();
var g=ctx.createGain(); g.gain.value=gain||1;

src1.buffer=decoded;
src1.playbackRate.value=0.55;
var dist1=ctx.createWaveShaper();
dist1.curve=makeDistortionCurve(600);
dist1.oversample='4x';
var gain1=ctx.createGain(); gain1.gain.value=3.5;

lpf1.type='lowpass'; lpf1.frequency.value=800;
src1.connect(dist1); dist1.connect(lpf1); lpf1.connect(gain1); gain1.connect(ctx.destination);
src1.start(0);

src2.buffer=decoded;

function makeDistortionCurve(amount){
var n=256, curve=new Float32Array(n);
for(var i=0;i<n;i++){
var x=(i*2/n)-1;
curve[i]=(Math.PI+amount)*x/(Math.PI+amount*Math.abs(x));
}
return curve;
}
