<html>
<head>
<meta charset="utf-8">
<title>House</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Titillium+Web:wght@300;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Titillium Web',sans-serif;}
#loadscreen{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity 0.5s ease;}
#loadscreen.fade-out{opacity:0;pointer-events:none;}
.load-inner{display:flex;flex-direction:column;align-items:center;gap:10px;animation:fadeInUp 0.6s ease forwards;opacity:0;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.load-title{font-family:'Titillium Web',sans-serif;font-weight:600;font-size:22px;letter-spacing:0.18em;color:#fff;text-transform:uppercase;}
.load-sub{font-family:'Share Tech Mono',monospace;font-size:11.5px;letter-spacing:0.06em;color:#8fa3b1;text-transform:uppercase;}
.load-bar-wrap{margin-top:22px;width:180px;height:2px;background:#1a2530;border-radius:2px;overflow:hidden;}
.load-bar{height:100%;width:0%;background:#8fa3b1;border-radius:2px;transition:width 0.1s linear;}
#shell{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity 0.5s ease 0.1s;}
#shell.visible{opacity:1;}
#game-title{font-family:'Share Tech Mono',monospace;font-size:17px;letter-spacing:0.18em;color:#c8d8e4;text-transform:uppercase;margin-bottom:9px;user-select:none;text-shadow:0 0 12px rgba(180,210,230,0.35);}
#gamecanvas-wrap{position:relative;width:800px;height:666px;transform-origin:top center;}
canvas#gameCanvas{display:block;background:#000;}
#titleContainer{user-select:none;font-size:18px;font-family:'Share Tech Mono',monospace;position:absolute;right:9px;bottom:6px;color:rgba(255,255,255,0.7);text-shadow:0px 2px 5px rgba(255,255,255,0.25);transition:opacity 100ms;pointer-events:none;letter-spacing:0.08em;}
#staminaWrap{position:absolute;bottom:10px;left:8px;width:100px;height:2px;}
canvas#stamina{display:block;}
#killscreen{display:none;position:fixed;inset:0;z-index:500;}
#killscreen.active{display:block;}
#gameOverScreen{width:100%;height:100%;position:absolute;background:url('https://i.ibb.co/SXJfSBX1/death-screen.jpg') no-repeat center/cover;animation:panLeft 45s linear infinite;text-align:center;color:#faa;text-shadow:0px 3px 8px #000;font-size:46px;font-family:serif;overflow:hidden;}
#gameOverScreen::before{animation:redFlash 1s linear;content:'';width:100%;height:100%;display:block;position:absolute;top:0;left:0;z-index:1;pointer-events:none;}
@keyframes redFlash{0%{background:rgba(255,0,0,1)}100%{background:rgba(0,0,0,0)}}
@keyframes panLeft{0%{background-position:70% 0}100%{background-position:-1% 0}}
#caughtText{color:rgba(225,17,7,0.47);font-size:100px;font-weight:bold;margin-top:110px;margin-bottom:119px;position:relative;}
#replayBtn{font-size:32px;color:#faa;cursor:pointer;font-family:'Share Tech Mono',monospace;letter-spacing:0.1em;}
#replayBtn:hover{color:#fcc;}
#winscreen{display:none;position:fixed;inset:0;z-index:500;background:#000;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
#winscreen.active{display:flex;}
#winscreen p{font-family:'Share Tech Mono',monospace;color:#8fa3b1;font-size:14px;letter-spacing:0.15em;text-transform:uppercase;}
#winscreen button{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:0.15em;color:#c8d8e4;background:none;border:1px solid #2a3d4a;padding:8px 18px;cursor:pointer;text-transform:uppercase;}
#winscreen button:hover{border-color:#c8d8e4;}
</style>
</head>
<body>
<div id="loadscreen">
<div class="load-inner">
<div class="load-title">House</div>
<div class="load-sub">Ported By Sylex.</div>
<div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
</div>
</div>
<div id="killscreen">
<div id="gameOverScreen">
<div id="caughtText">CAUGHT</div>
<div id="replayBtn" onclick="restartGame()">Replay</div>
</div>
</div>
<div id="winscreen">
<p>You escaped.</p>
<button onclick="restartGame()">Play Again</button>
</div>
<div id="shell">
<div id="game-title">Ported By SylexMC &mdash; House</div>
<div id="gamecanvas-wrap">
<canvas id="gameCanvas" width="800" height="666"></canvas>
<div id="titleContainer"></div>
<div id="staminaWrap"><canvas id="stamina" width="128" height="2"></canvas></div>
</div>
</div>
<script>
var GAME_W=800,GAME_H=666;
function scaleGame(){
var w=document.getElementById('gamecanvas-wrap');
var s=Math.min(window.innerWidth/GAME_W,(window.innerHeight-46)/GAME_H,1);
w.style.transform='scale('+s+')';
}
scaleGame();
window.addEventListener('resize',scaleGame);
var IMG={
scream11:'https://i.ibb.co/B5P0pJjR/scream11.png',
arrow_down:'https://i.ibb.co/67TYkLD1/arrow-down.png',
B1_deskpaper:'https://i.ibb.co/Q3FqXRf8/B1-deskpaper.png',
B1_clock:'https://i.ibb.co/FdD8HDB/B1-clock.png',
B5_head:'https://i.ibb.co/0yQdvxdd/B5-head.png',
B5_over:'https://i.ibb.co/fYbwvCF9/B5-over.png',
A3_chand:'https://i.ibb.co/YB9KSDjB/A3-chand.png',
A4_lightflash:'https://i.ibb.co/Mkz7nrBt/A4-lightflash.png',
D2:'https://i.ibb.co/HfWBjnvd/D2.gif',
secret1:'https://i.ibb.co/C5tydN9p/secret1.jpg',
secret2:'https://i.ibb.co/TfdcpGW/secret2.jpg',
A1:'https://i.ibb.co/TxjcB5Cf/A1.jpg',
A2:'https://i.ibb.co/m5DkhgHQ/A2.jpg',
A3:'https://i.ibb.co/6RYW3zz3/A3.jpg',
A4:'https://i.ibb.co/jPk1WKR7/A4.jpg',
A5:'https://i.ibb.co/mrhV4H25/A5.jpg',
B1:'https://i.ibb.co/4n6qF0hq/B1.jpg',
C1:'https://i.ibb.co/WWbrydGz/C1.jpg',
C2:'https://i.ibb.co/Wp7QXgcf/C2.jpg',
C3:'https://i.ibb.co/DP91pf6h/C3.jpg',
D1:'https://i.ibb.co/pjbw2xL9/D1.jpg',
D1_handle:'https://i.ibb.co/mV3QMYVG/D1-handle.png',
paper:'https://i.ibb.co/LKsdDVV/paper.png',
};
var WB='https://web.archive.org/web/20240720202503im_/https://nez.fyi/sml-assets/game_root/assets/';
var SFX={
walkfwd: WB+'walkforward.ogg',
walkbwd: WB+'walkbackward.ogg',
lighthum: WB+'lighthum.ogg',
guest: WB+'guest.ogg',
atnight: WB+'atnight.ogg',
bgloop: WB+'bgloop01.ogg',
heartbeat: WB+'helmet.ogg',
breathsDeep: WB+'deepbreaths.ogg',
loudjscare: WB+'loudjscare.ogg',
endSong: 'https://web.archive.org/web/20240720202503im_/https://nez.fyi/g-assets/cvbcvbcvb.ogg',
doorjam: WB+'doorjam.ogg',
grabpaper: WB+'grabpaper.ogg',
dooropen: WB+'dooropen.ogg',
piano: 'https://web.archive.org/web/20240721214359im_/https://nez.fyi/sml-assets/game_root/assets/PIANOtrim.ogg',
atnight_mp3: 'https://web.archive.org/web/20240720202503im_/https://nez.fyi/voidstuff/sounds-general/atnight.mp3',
};
var preloadImgs=Object.values(IMG);
var loaded=0;
var bar=document.getElementById('load-bar');
function preloadAll(urls,cb){
var total=urls.length;
urls.forEach(function(u){
var i=new Image();
i.onload=i.onerror=function(){
loaded++;
bar.style.width=Math.round(loaded/total*100)+'%';
if(loaded>=total)cb();
};
i.src=u;
});
}
function bootGame(){
var ls=document.getElementById('loadscreen');
ls.classList.add('fade-out');
setTimeout(function(){ls.style.display='none';},500);
document.getElementById('shell').classList.add('visible');
startGame();
}
preloadAll(preloadImgs,function(){
setTimeout(bootGame,3000);
});
function restartGame(){
document.getElementById('killscreen').classList.remove('active');
document.getElementById('winscreen').classList.remove('active');
startGame();
}
function startGame(){
var canvas=document.getElementById('gameCanvas');
var ctx=canvas.getContext('2d');
var currentScene='A1';
var fadeOut=false,fadeIn=false,fadeValue=0;
var overlayImage;
var flashCounter=0;
var flashInterval=5000;
var mouseX=0,mouseY=0;
var cooldownDuration=1200;
var lastSceneChangeTime=0;
var endingTriggered=false;
var _d3played=false;
var _prevScene='';
var _gameRunning=true;
function mkAudio(src){var a=new Audio(src);return a;}
var light=mkAudio(SFX.lighthum);
var guestSound=mkAudio(SFX.guest);
var atnight=mkAudio(SFX.atnight_mp3);
var mainAmbience=mkAudio(SFX.bgloop);
var heartbeat=mkAudio(SFX.heartbeat);
var breathsDeep=mkAudio(SFX.breathsDeep);
var failNoise=mkAudio(SFX.loudjscare);
var endSong=mkAudio(SFX.endSong);
var walkFwd=mkAudio(SFX.walkfwd);
var walkBwd=mkAudio(SFX.walkbwd);
function stopAll(){
[light,guestSound,atnight,mainAmbience,heartbeat,breathsDeep,failNoise,endSong,walkFwd,walkBwd].forEach(function(a){
try{a.pause();a.currentTime=0;a.loop=false;}catch(e){}
});
}
function showEndingA(){
if(endingTriggered)return;
endingTriggered=true;
_gameRunning=false;
stopAll();
setTimeout(function(){
var piano=mkAudio(SFX.piano);
piano.play();
document.getElementById('killscreen').classList.add('active');
},1200);
}
function showEndingB(){
if(endingTriggered)return;
endingTriggered=true;
_gameRunning=false;
stopAll();
setTimeout(function(){
document.getElementById('winscreen').classList.add('active');
},600);
}
var titleAnimEl=document.getElementById('titleContainer');
var staminaCanvas=document.getElementById('stamina');
var staminaCtx=staminaCanvas.getContext('2d');
var staminaAnim=false;
function animateStamina(){
if(staminaAnim)return;
staminaAnim=true;
var start;
function step(t){
if(!start)start=t;
var p=(t-start)/cooldownDuration;
if(p<1){
staminaCtx.clearRect(0,0,128,2);
staminaCtx.fillStyle='#fff';
staminaCtx.fillRect(0,0,128*p,2);
requestAnimationFrame(step);
}else{staminaAnim=false;}
}
requestAnimationFrame(step);
}
var scenes={
'A1':{image:IMG.A1,clickableAreas:[{x:256,y:240,width:80,height:200,destination:'A2',title:'Front Entrance'}]},
'A2':{image:IMG.A2,clickableAreas:[{x:560,y:80,width:240,height:490,destination:'A3',title:'Dining Room'}]},
'D1':{image:IMG.D1,clickableAreas:[{x:540,y:320,width:62,height:110,destination:'D1SOUND',title:'Front door handle'}]},
'A3':{image:IMG.A3,clickableAreas:[
{x:20,y:180,width:150,height:256,destination:'A4',title:'Kitchen (View A)'},
{x:500,y:100,width:298,height:350,destination:'C1',title:'Main Hall'}
]},
'C1':{image:IMG.C1,clickableAreas:[
{x:256,y:60,width:286,height:473,destination:'C2',title:'Bedroom (B)'},
{x:710,y:70,width:89,height:533,destination:'C3',title:'Bedroom (A)'}
]},
'C2':{image:IMG.C2,clickableAreas:[{x:-10,y:-10,width:9,height:9,destination:'Z1'}]},
'C3':{image:IMG.C3,clickableAreas:[{x:-10,y:-10,width:9,height:9,destination:'Z1'}]},
'A4':{image:IMG.A4,clickableAreas:[
{x:10,y:200,width:259,height:250,destination:'A5',title:'Kitchen (View B)'},
{x:514,y:317,width:110,height:34,destination:'B1',title:'Piece of paper'}
]},
'A5':{image:IMG.A5,clickableAreas:[{x:-10,y:-10,width:9,height:9,destination:'Z1'}]},
'B1':{image:IMG.B1,clickableAreas:[{x:214,y:429,width:366,height:169,destination:'B1ACTIN',title:'Piece of paper (Pick-up)'}]},
'B3':{image:IMG.B1,clickableAreas:[{x:-10,y:-10,width:9,height:9,destination:'Z1'}]},
'B4':{image:IMG.A4,clickableAreas:[
{x:10,y:200,width:259,height:250,destination:'B5'},
{x:514,y:317,width:110,height:34,destination:'B3'}
]},
'B5':{image:IMG.A5,clickableAreas:[{x:-10,y:-10,width:9,height:9,destination:'Z1'}]},
'B6':{image:IMG.A3,clickableAreas:[
{x:20,y:180,width:150,height:256,destination:'B4'},
{x:500,y:100,width:298,height:350,destination:'FAIL0'}
]},
'FAIL0':{image:IMG.A5,clickableAreas:[{x:-10,y:-10,width:9,height:9,destination:'Z1'}]},
'D2':{image:IMG.D2,clickableAreas:[{x:209,y:20,width:389,height:590,destination:'D3',title:'???'}]},
'D3':{image:IMG.secret1,clickableAreas:[{x:530,y:420,width:120,height:40,destination:'D4',title:'Tape (Pick-up)'}]},
'D4':{image:IMG.secret2,clickableAreas:[{x:-10,y:-10,width:9,height:9,destination:'Z1'}]},
};
var backwardMap={
'A2':'D1','D1':'A2',
'A3':'A2',
'A4':'A3',
'C1':'A3','C2':'C1','C3':'C1',
'A5':'A4','B1':'A4',
'B3':'B4',
'B5':'B4','B4':'B6',
'B6':'D2','D2':'B6',
};
function isInside(area,mx,my){
return mx>=area.x&&mx<=area.x+area.width&&my>=area.y&&my<=area.y+area.height;
}
function drawScene(){
if(!_gameRunning)return;
var scene=scenes[currentScene];
if(!scene)return;
var img=new Image();
img.src=scene.image;
img.onload=function(){
ctx.clearRect(0,0,canvas.width,canvas.height);
var moveX=(mouseX-canvas.width/2)/100;
var moveY=-1*(mouseY-canvas.height/2)/75;
var rotation=(mouseX-canvas.width/2)*0.001;
ctx.save();
ctx.translate(canvas.width/2+moveX,canvas.height/2+moveY);
ctx.rotate(rotation*(Math.PI/180));
var zf=1.05;var zw=canvas.width*zf;var zh=canvas.height*zf;
ctx.drawImage(img,-zw/2,-zh/2,zw,zh);
if(currentScene==='A1'){atnight.play();atnight.loop=true;}
if(currentScene==='A2'){mainAmbience.play();mainAmbience.loop=true;atnight.pause();atnight.loop=false;}
if(currentScene==='A4'){
if(overlayImage&&light.currentTime>0&&!light.paused){ctx.drawImage(overlayImage,-zw/2,-zh/2,zw,zh);}
if(flashCounter>=flashInterval/16){
overlayImage=new Image();overlayImage.src=IMG.A4_lightflash;
light.play();flashCounter=0;
}else{flashCounter++;}
}
if(currentScene==='A3'||currentScene==='B6'){
var rot=Math.sin(Date.now()*0.0019)*0.01;
var ty=-432;
ctx.rotate(rot);ctx.translate(0,ty);
var chand=new Image();chand.src=IMG.A3_chand;
ctx.drawImage(chand,-canvas.width/2,-canvas.height/2,canvas.width,canvas.height);
}
if(currentScene==='B1'){
var dp=new Image();dp.src=IMG.B1_deskpaper;
ctx.drawImage(dp,-canvas.width/2,-canvas.height/2+93,canvas.width,canvas.height);
var fi=1200;var fm=fi/16;
if(flashCounter>=fm){var ck=new Image();ck.src=IMG.B1_clock;ctx.drawImage(ck,-canvas.width/2,-canvas.height/2,canvas.width,canvas.height);}
if(flashCounter>=fm*2){flashCounter=0;}else{flashCounter++;}
}
if(currentScene==='C3'){breathsDeep.play();breathsDeep.loop=true;}
if(currentScene==='C1'){breathsDeep.pause();breathsDeep.loop=false;}
if(currentScene==='D1'){
var hi=new Image();hi.src=IMG.D1_handle;
ctx.drawImage(hi,-canvas.width/2,-canvas.height/2,canvas.width,canvas.height);
}
if(currentScene==='B3'){
var fi2=1200;var fm2=fi2/16;
if(flashCounter>=fm2){var ck2=new Image();ck2.src=IMG.B1_clock;ctx.drawImage(ck2,-canvas.width/2,-canvas.height/2,canvas.width,canvas.height);}
if(flashCounter>=fm2*2){flashCounter=0;}else{flashCounter++;}
}
if(currentScene==='B5'){
var now=Date.now();
var h=new Image();h.src=IMG.B5_head;
var ox=Math.min((now-lastSceneChangeTime)*0.5,100);
ctx.drawImage(h,-canvas.width/2+ox,-canvas.height/2,canvas.width,canvas.height);
var ov=new Image();ov.src=IMG.B5_over;
ctx.drawImage(ov,-zw/2,-zh/2,zw,zh);
}
if(currentScene==='FAIL0'&&!endingTriggered){
var fi3=new Image();fi3.src=IMG.scream11;
guestSound.pause();mainAmbience.pause();heartbeat.pause();failNoise.play();
var animDur=2000;var maxRot=7;var rotSpd=0.9;var sclSpd=0.6;
var t0=Date.now();
function animFail(ct){
var el=ct-t0;
ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);
var ra=maxRot*Math.sin(el*rotSpd);
var sc=1+Math.abs(Math.sin(el*sclSpd))*0.3;
ctx.save();
ctx.translate(canvas.width/2,canvas.height/2);
ctx.rotate(ra*(Math.PI/180));ctx.scale(sc,sc);
ctx.drawImage(fi3,-fi3.width/2,-fi3.height/2);
ctx.restore();
showEndingA();
if(el<animDur)requestAnimationFrame(animFail);
}
animFail(Date.now());
}
if(currentScene==='D2'){heartbeat.loop=false;}
if(currentScene==='D3'&&!_d3played){_d3played=true;guestSound.pause();endSong.play();endSong.loop=true;}
if(currentScene==='D4'&&!endingTriggered){endSong.pause();showEndingB();}
ctx.restore();
if(currentScene!=='A1'){
var arr=new Image();arr.src=IMG.arrow_down;
ctx.drawImage(arr,375,600,50,50);
}
scene.clickableAreas.forEach(function(area){
ctx.beginPath();
ctx.rect(area.x,area.y,area.width,area.height);
ctx.lineWidth=2;ctx.strokeStyle='transparent';ctx.stroke();ctx.closePath();
});
if(fadeOut){
fadeValue+=0.07;
ctx.fillStyle='rgba(0,0,0,'+fadeValue+')';
ctx.fillRect(0,0,canvas.width,canvas.height);
if(fadeValue>=1){fadeOut=false;fadeIn=true;changeScene();}
}
if(fadeIn){
fadeValue-=0.02;
ctx.fillStyle='rgba(0,0,0,'+fadeValue+')';
ctx.fillRect(0,0,canvas.width,canvas.height);
if(fadeValue<=0){fadeIn=false;}
}
requestAnimationFrame(drawScene);
};
}
function changeScene(){
var now=Date.now();
if(now-lastSceneChangeTime<cooldownDuration)return;
var scene=scenes[currentScene];
scene.clickableAreas.forEach(function(area){
if(area.destination&&isInside(area,mouseX,mouseY)){
if(area.destination==='D1SOUND'){
var s=new Audio(SFX.doorjam);s.play();
}else if(area.destination==='B1ACTIN'){
handleB1ACTIN();
}else if(area.destination==='Z1'){
}else{
var prev=currentScene;
currentScene=area.destination;
if(prev==='D3'&&area.destination!=='D3')_d3played=false;
fadeOut=true;
lastSceneChangeTime=now;
walkFwd.play();
}
}
});
}
function handleB1ACTIN(){
currentScene='B3';
var s=new Audio(SFX.grabpaper);s.play();
var pi=new Image();pi.src=IMG.paper;
var el=document.createElement('img');
el.src=IMG.paper;
el.style.cssText='position:absolute;width:690px;height:690px;margin-left:60px;margin-top:-1px;top:0;left:0;z-index:50;transition:transform 1.2s cubic-bezier(.1,1.23,1,.94);';
document.getElementById('gamecanvas-wrap').appendChild(el);
setTimeout(function(){el.style.transform='translateY(-590px)';},50);
setTimeout(function(){el.style.transform='translateY(0)';},2200);
setTimeout(function(){var d=new Audio(SFX.dooropen);d.play();mainAmbience.pause();},2000);
setTimeout(function(){guestSound.loop=true;guestSound.play();heartbeat.play();heartbeat.loop=true;},4000);
setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},5000);
}
function goBack(){
var prev=backwardMap[currentScene];
if(prev){currentScene=prev;fadeOut=true;walkBwd.play();}
}
canvas.addEventListener('click',function(e){
var r=canvas.getBoundingClientRect();
mouseX=e.clientX-r.left;mouseY=e.clientY-r.top;
if(currentScene!=='A1'&&mouseX>=375&&mouseX<=425&&mouseY>=600&&mouseY<=650){
goBack();
}else{
changeScene();
animateStamina();
}
});
canvas.addEventListener('mousemove',function(e){
var r=canvas.getBoundingClientRect();
mouseX=e.clientX-r.left;mouseY=e.clientY-r.top;
var inside=false;var title='';
var scene=scenes[currentScene];
if(scene){
scene.clickableAreas.forEach(function(area){
if(isInside(area,mouseX,mouseY)){inside=true;title=area.title||'';}
});
}
if(mouseX>=375&&mouseX<=425&&mouseY>=600&&mouseY<=650)inside=true;
canvas.style.cursor=inside?'pointer':'default';
titleAnimEl.style.opacity=inside?1:0;
titleAnimEl.innerText=title;
});
canvas.addEventListener('mouseout',function(){titleAnimEl.style.opacity=0;});
drawScene();
}
</script>
</body>
</html>
